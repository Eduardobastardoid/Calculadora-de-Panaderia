<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Panadera</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM v18 -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel Standalone for JSX compilation in browser -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.22.20/babel.min.js" crossorigin></script>

    <!-- Custom Premium Styles (Vanilla CSS) -->
    <style type="text/css">
        :root {
            --bg-color: #fbf9f6;
            --text-color: #2e201b;
            --text-muted: #6b5a54;
            --primary: #d46338;
            --primary-hover: #b84e27;
            --primary-light: #fcf0e8;
            --secondary: #8a3f24;
            --accent: #e8a863;
            --border: #ebdcd3;
            --border-focus: #d46338;
            --card-bg: #ffffff;
            --success: #3c7a5a;
            --success-light: #eef7f2;
            --danger: #b53828;
            --danger-light: #fdf2f0;
            --warning: #cc8400;
            --warning-light: #fff8e6;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 24px;
            --shadow-sm: 0 4px 6px -1px rgba(46, 32, 27, 0.05), 0 2px 4px -1px rgba(46, 32, 27, 0.03);
            --shadow-md: 0 10px 15px -3px rgba(46, 32, 27, 0.08), 0 4px 6px -2px rgba(46, 32, 27, 0.04);
            --shadow-lg: 0 20px 25px -5px rgba(46, 32, 27, 0.12), 0 10px 10px -5px rgba(46, 32, 27, 0.06);
            --font-sans: 'Outfit', sans-serif;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Layout Structure */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Permanent Header */
        .permanent-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            background-color: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .header-logo svg {
            width: 24px;
            height: 24px;
            color: var(--primary);
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--text-color);
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Menu Button */
        .menu-trigger {
            background: var(--primary-light);
            border: none;
            color: var(--primary);
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .menu-trigger:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        /* Main Content wrapper */
        .main-wrapper {
            flex: 1;
            padding: 24px;
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }

        /* Sliding Drawer Sidebar */
        .sidebar-drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 300px;
            height: 100%;
            background: var(--card-bg);
            box-shadow: var(--shadow-lg);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .sidebar-drawer.open {
            transform: translateX(0);
        }

        .sidebar-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(46, 32, 27, 0.4);
            backdrop-filter: blur(4px);
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }

        .sidebar-backdrop.visible {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--transition);
        }

        .sidebar-close:hover {
            background: var(--bg-color);
            color: var(--danger);
        }

        .sidebar-menu {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            transition: var(--transition);
        }

        .sidebar-link:hover {
            color: var(--primary);
            background-color: var(--primary-light);
        }

        .sidebar-link.active {
            color: white;
            background-color: var(--primary);
            box-shadow: 0 4px 10px rgba(212, 99, 56, 0.3);
        }

        .sidebar-link svg {
            width: 20px;
            height: 20px;
        }

        .sidebar-footer {
            padding: 24px;
            border-top: 1px solid var(--border);
        }

        .btn-logout {
            width: 100%;
            padding: 12px;
            border-radius: var(--radius-md);
            background-color: var(--danger-light);
            color: var(--danger);
            border: 1px solid rgba(181, 56, 40, 0.1);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-logout:hover {
            background-color: var(--danger);
            color: white;
            box-shadow: 0 4px 10px rgba(181, 56, 40, 0.2);
        }

        /* Glassmorphic Panel Card */
        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            margin-bottom: 24px;
        }

        .glass-panel:hover {
            box-shadow: var(--shadow-md);
        }

        /* Headings & Text */
        .view-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .view-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* Grid systems */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        /* Dashboard specific */
        .dashboard-hero {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            color: white;
            border-radius: var(--radius-lg);
            padding: 36px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            margin-bottom: 28px;
            border: none;
        }

        .dashboard-hero::after {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(232, 168, 99, 0.25) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-welcome {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .hero-desc {
            max-width: 600px;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .dashboard-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .action-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .action-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .action-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .action-card:hover .action-icon {
            background-color: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .action-card h3 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .action-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Suggestions of season */
        .suggestions-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .suggestions-badge {
            background-color: var(--primary-light);
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .recipe-grid-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .recipe-grid-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .recipe-card-img-placeholder {
            height: 140px;
            background: linear-gradient(135deg, #f3e9e5 0%, #ebd9cf 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            position: relative;
        }

        .recipe-card-season-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--card-bg);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: var(--shadow-sm);
        }

        .recipe-card-season-badge.invierno {
            color: #0b66a3;
            background: #eef7fc;
        }

        .recipe-card-season-badge.verano {
            color: #b35900;
            background: #fff6ed;
        }

        .recipe-card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .recipe-card-title {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .recipe-card-info {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .btn-recipe-action {
            margin-top: auto;
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-color);
            padding: 8px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-recipe-action:hover {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Buttons styling */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: var(--radius-sm);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 6px rgba(212, 99, 56, 0.15);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(212, 99, 56, 0.25);
        }

        .btn-secondary {
            background-color: var(--primary-light);
            color: var(--primary);
        }

        .btn-secondary:hover {
            background-color: var(--primary);
            color: white;
        }

        .btn-outline {
            background-color: transparent;
            border-color: var(--border);
            color: var(--text-color);
        }

        .btn-outline:hover {
            background-color: var(--bg-color);
            border-color: var(--text-color);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: #9d2e20;
        }

        .btn-block {
            display: flex;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Form elements */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            font-family: var(--font-sans);
            padding: 10px 14px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background-color: #ffffff;
            color: var(--text-color);
            font-size: 0.95rem;
            width: 100%;
            transition: var(--transition);
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(212, 99, 56, 0.15);
        }

        /* Checkbox styling */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            height: 22px;
            width: 22px;
            background-color: #eee;
            border-radius: var(--radius-sm);
            display: inline-block;
            position: relative;
            transition: var(--transition);
        }

        .checkbox-container:hover input ~ .checkmark {
            background-color: #ccc;
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--primary);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 8px;
            top: 4px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        /* Alert/Status Blocks */
        .alert-block {
            padding: 16px;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            margin-bottom: 16px;
            border: 1px solid transparent;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .alert-block svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .alert-warning {
            background-color: var(--warning-light);
            color: #8c5b00;
            border-color: rgba(204, 132, 0, 0.15);
        }

        .alert-danger {
            background-color: var(--danger-light);
            color: #90281b;
            border-color: rgba(181, 56, 40, 0.15);
        }

        .alert-info {
            background-color: var(--primary-light);
            color: var(--primary-hover);
            border-color: rgba(212, 99, 56, 0.15);
        }

        /* Table styles */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th {
            background-color: var(--bg-color);
            padding: 12px 16px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: var(--primary-light);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(46, 32, 27, 0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-container {
            background: white;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalFadeIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            background: var(--bg-color);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* Utility classes */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-success { background-color: var(--success-light); color: var(--success); }
        .badge-danger { background-color: var(--danger-light); color: var(--danger); }
        .badge-warning { background-color: var(--warning-light); color: var(--warning); }
        .badge-primary { background-color: var(--primary-light); color: var(--primary); }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .font-bold { font-weight: 700; }
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }

        /* Detail table block inside Calculator */
        .detail-table-card {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-top: 16px;
        }

        .detail-table-header {
            background-color: var(--primary-light);
            padding: 10px 16px;
            font-weight: 700;
            color: var(--secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
        }

        .detail-table-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: white;
        }

        .detail-table-row:last-child {
            border-bottom: none;
        }

        .detail-table-row.total-row {
            background-color: var(--bg-color);
            font-weight: 800;
            border-top: 2px solid var(--border);
        }

        /* Responsive utilities */
        @media (max-width: 768px) {
            .permanent-header {
                padding: 10px 16px;
            }
            .main-wrapper {
                padding: 16px;
            }
            .view-title {
                font-size: 1.5rem;
            }
            .dashboard-hero {
                padding: 24px;
            }
            .hero-welcome {

        // ==========================================

                                    <button class="btn btn-danger" onClick={handleTotalRestart} disabled={restartConfirmText.trim().toLowerCase() !== 'reiniciar'}>Confirmar Reinicio</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
