        // ==========================================
        // 2. GESTIÓN DE INSUMOS VIEW
        // ==========================================
        function InsumosView({ insumos, setInsumos }) {
            const [nombre, setNombre] = useState('');
            const [unidad, setUnidad] = useState('Gr');
            const [precioRef, setPrecioRef] = useState('');
            const [editingId, setEditingId] = useState(null);

            const resetForm = () => {
                setNombre('');
                setUnidad('Gr');
                setPrecioRef('');
                setEditingId(null);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!nombre.trim()) {
                    alert('El nombre del insumo es obligatorio.');
                    return;
                }

                const duplicado = insumos.some(ins => 
                    ins.id !== editingId && ins.nombre.toLowerCase().trim() === nombre.toLowerCase().trim()
                );
                if (duplicado) {
                    alert('Ya existe un insumo registrado con este nombre.');
                    return;
                }

                const precio = parseFloat(precioRef) || 0;

                if (editingId) {
                    setInsumos(prev => prev.map(ins => 
                        ins.id === editingId ? { ...ins, nombre: nombre.trim(), unidad, precioRef: precio } : ins
                    ));
                    alert('Insumo actualizado con éxito.');
                } else {
                    const newInsumo = {
                        id: 'i_' + Date.now(),
                        nombre: nombre.trim(),
                        unidad,
                        precioRef: precio
                    };
                    setInsumos(prev => [...prev, newInsumo]);
                    alert('Insumo agregado con éxito.');
                }
                resetForm();
            };

            const handleEdit = (insumo) => {
                setNombre(insumo.nombre);
                setUnidad(insumo.unidad);
                setPrecioRef(insumo.precioRef.toString());
                setEditingId(insumo.id);
            };

            const handleDelete = (id, nombreInsumo) => {
                if (window.confirm(`¿Estás seguro de que deseas eliminar el insumo "${nombreInsumo}"?`)) {
                    setInsumos(prev => prev.filter(ins => ins.id !== id));
                }
            };

            return (
                <div>
                    <h2 class="view-title">Gestión de Insumos</h2>
                    <p class="view-subtitle">Crea y edita los ingredientes que formarán parte de tus recetas.</p>

                    <div class="grid-2">
                        {/* Form Card */}
                        <div class="glass-panel">
                            <h3 class="mb-4 font-bold">{editingId ? 'Editar Insumo' : 'Añadir Insumo'}</h3>
                            <form onSubmit={handleSubmit}>
                                <div class="form-group">
                                    <label>Nombre del Insumo</label>
                                    <input 
                                        type="text" 
                                        value={nombre} 
                                        onChange={(e) => setNombre(e.target.value)} 
                                        placeholder="Ej. Harina de Centeno, Azúcar Blanca"
                                    />
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Unidad de Medida</label>
                                        <select value={unidad} onChange={(e) => setUnidad(e.target.value)}>
                                            <option value="Gr">Gr (Gramos)</option>
                                            <option value="Kg">Kg (Kilogramos)</option>
                                            <option value="Ltr">Ltr (Litros)</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Precio Ref. ($)</label>
                                        <input 
                                            type="number" 
                                            value={precioRef} 
                                            onChange={(e) => setPrecioRef(e.target.value)} 
                                            placeholder="Ej. 1200"
                                            min="0"
                                            step="0.01"
                                        />
                                    </div>
                                </div>
                                <div class="form-row mt-4">
                                    <button type="submit" class="btn btn-primary">{editingId ? 'Actualizar' : 'Guardar'}</button>
                                    {editingId && <button type="button" class="btn btn-outline" onClick={resetForm}>Cancelar</button>}
                                </div>
                            </form>
                        </div>

                        {/* List Card */}
                        <div class="glass-panel">
                            <h3 class="mb-4 font-bold">Listado de Insumos ({insumos.length})</h3>
                            {insumos.length === 0 ? (
                                <p class="text-muted text-center py-6">No hay insumos registrados.</p>
                            ) : (
                                <div class="table-responsive" style={{ maxHeight: '400px' }}>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Nombre</th>
                                                <th>Unidad</th>
                                                <th>Precio Ref.</th>
                                                <th class="text-right">Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {insumos.map(ins => (
                                                <tr key={ins.id}>
                                                    <td class="font-bold">{ins.nombre}</td>
                                                    <td><span class="badge badge-primary">{ins.unidad}</span></td>
                                                    <td>${ins.precioRef || 0}</td>
                                                    <td class="text-right">
                                                        <button class="btn btn-secondary btn-sm" onClick={() => handleEdit(ins)} style={{ marginRight: '6px' }}>Editar</button>
                                                        <button class="btn btn-danger btn-sm" onClick={() => handleDelete(ins.id, ins.nombre)}>Eliminar</button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. GESTIÓN DE BATIDOS BASE VIEW
        // ==========================================
        function BatidosView({ batidosBase, setBatidosBase }) {
            const [nombre, setNombre] = useState('');
            const [totalMasaTeorica, setTotalMasaTeorica] = useState('');
            const [temporada, setTemporada] = useState('verano');
            const [esActiva, setEsActiva] = useState(true);
            const [editingId, setEditingId] = useState(null);

            const resetForm = () => {
                setNombre('');
                setTotalMasaTeorica('');
                setTemporada('verano');
                setEsActiva(true);
                setEditingId(null);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!nombre.trim()) {
                    alert('El nombre del batido base es obligatorio.');
                    return;
                }
                const masa = parseFloat(totalMasaTeorica) || 0;
                if (masa <= 0) {
                    alert('La masa teórica total debe ser mayor a 0.');
                    return;
                }

                const duplicado = batidosBase.some(b => 
                    b.id !== editingId && b.nombre.toLowerCase().trim() === nombre.toLowerCase().trim()
                );
                if (duplicado) {
                    alert('Ya existe un batido base registrado con este nombre.');
                    return;
                }

                if (editingId) {
                    setBatidosBase(prev => prev.map(b => 
                        b.id === editingId ? { ...b, nombre: nombre.trim(), totalMasaTeorica: masa, temporada, esActiva } : b
                    ));
                    alert('Batido base actualizado con éxito.');
                } else {
                    const newBatido = {
                        id: 'b_' + Date.now(),
                        nombre: nombre.trim(),
                        totalMasaTeorica: masa,
                        temporada,
                        esActiva
                    };
                    setBatidosBase(prev => [...prev, newBatido]);
                    alert('Batido base guardado con éxito.');
                }
                resetForm();
            };

            const handleEdit = (batido) => {
                setNombre(batido.nombre);
                setTotalMasaTeorica(batido.totalMasaTeorica.toString());
                setTemporada(batido.temporada);
                setEsActiva(batido.esActiva);
                setEditingId(batido.id);
            };

            const handleDelete = (id, nombreBatido, esActivaStatus) => {
                if (esActivaStatus) {
                    alert(`El batido base "${nombreBatido}" está en estado ACTIVA y no puede eliminarse por seguridad.`);
                    return;
                }
                if (window.confirm(`¿Estás seguro de que deseas eliminar el batido base "${nombreBatido}"?`)) {
                    setBatidosBase(prev => prev.filter(b => b.id !== id));
                }
            };

            return (
                <div>
                    <h2 class="view-title">Gestión de Batidos Base</h2>
                    <p class="view-subtitle">Define los tipos de batido base y sus masas de producción teóricas.</p>

                    <div class="grid-2">
                        {/* Form Card */}
                        <div class="glass-panel">
                            <h3 class="mb-4 font-bold">{editingId ? 'Editar Batido Base' : 'Añadir Batido Base'}</h3>
                            <form onSubmit={handleSubmit}>
                                <div class="form-group">
                                    <label>Nombre del Batido</label>
                                    <input 
                                        type="text" 
                                        value={nombre} 
                                        onChange={(e) => setNombre(e.target.value)} 
                                        placeholder="Ej. Batido de Pan Francés Standard"
                                    />
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Masa Teórica Total (Gr)</label>
                                        <input 
                                            type="number" 
                                            value={totalMasaTeorica} 
                                            onChange={(e) => setTotalMasaTeorica(e.target.value)} 
                                            placeholder="Ej. 25000"
                                            min="1"
                                        />
                                    </div>
                                    <div class="form-group">
                                        <label>Temporada</label>
                                        <select value={temporada} onChange={(e) => setTemporada(e.target.value)}>
                                            <option value="verano">Verano</option>
                                            <option value="invierno">Invierno</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group mt-2">
                                    <label class="checkbox-container">
                                        <input 
                                            type="checkbox" 
                                            checked={esActiva} 
                                            onChange={(e) => setEsActiva(e.target.checked)}
                                        />
                                        <span class="checkmark"></span>
                                        Estado Activa (Bloquea eliminación por seguridad)
                                    </label>
                                </div>
                                <div class="form-row mt-4">
                                    <button type="submit" class="btn btn-primary">{editingId ? 'Actualizar' : 'Guardar'}</button>
                                    {editingId && <button type="button" class="btn btn-outline" onClick={resetForm}>Cancelar</button>}
                                </div>
                            </form>
                        </div>

                        {/* List Card */}
                        <div class="glass-panel">
                            <h3 class="mb-4 font-bold">Batidos Base Registrados ({batidosBase.length})</h3>
                            {batidosBase.length === 0 ? (
                                <p class="text-muted text-center py-6">No hay batidos registrados.</p>
                            ) : (
                                <div class="table-responsive" style={{ maxHeight: '420px' }}>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Nombre</th>
                                                <th>Masa Teór.</th>
                                                <th>Temp.</th>
                                                <th>Estado</th>
                                                <th class="text-right">Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {batidosBase.map(b => (
                                                <tr key={b.id}>
                                                    <td class="font-bold">{b.nombre}</td>
                                                    <td>{(b.totalMasaTeorica / 1000).toFixed(2)} Kg</td>
                                                    <td>
                                                        <span class={`badge ${b.temporada === 'verano' ? 'badge-warning' : 'badge-primary'}`}>
                                                            {b.temporada}
                                                        </span>
                                                    </td>
                                                    <td>
                                                        <span class={`badge ${b.esActiva ? 'badge-success' : 'badge-danger'}`}>
                                                            {b.esActiva ? 'Activa' : 'Inactiva'}
                                                        </span>
                                                    </td>
                                                    <td class="text-right">
                                                        <button class="btn btn-secondary btn-sm" onClick={() => handleEdit(b)} style={{ marginRight: '6px' }}>Editar</button>
                                                        <button 
                                                            class="btn btn-danger btn-sm" 
                                                            onClick={() => handleDelete(b.id, b.nombre, b.esActiva)}
                                                            disabled={b.esActiva}
                                                            title={b.esActiva ? 'No se puede eliminar un batido base activo' : ''}
                                                        >
                                                            Eliminar
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 4. MÓDULO DE RECETAS VIEW
        // ==========================================
        function RecetasView({ recetas, setRecetas, insumos, batidosBase }) {
            const [nombre, setNombre] = useState('');
            const [foto, setFoto] = useState('');
            const [notas, setNotas] = useState('');
            const [temporada, setTemporada] = useState('verano');
            const [esActiva, setEsActiva] = useState(true);
            const [batidoBaseId, setBatidoBaseId] = useState('');
            const [pesoUnidad, setPesoUnidad] = useState('');
            const [unidadesPorBandeja, setUnidadesPorBandeja] = useState('');
            const [bandejasPorCarro, setBandejasPorCarro] = useState('');
            const [tipoPorcentaje, setTipoPorcentaje] = useState('panadero');

            const [recipeIngs, setRecipeIngs] = useState({});
            const [selectedInsumoId, setSelectedInsumoId] = useState('');
            const [ingPctFabricante, setIngPctFabricante] = useState('');
            const [ingPctPanadero, setIngPctPanadero] = useState('');
            const [ingPctEstandar, setIngPctEstandar] = useState('');

            const [editingId, setEditingId] = useState(null);

            const resetForm = () => {
                setNombre('');
                setFoto('');
                setNotas('');
                setTemporada('verano');
                setEsActiva(true);
                setBatidoBaseId(batidosBase[0]?.id || '');
                setPesoUnidad('');
                setUnidadesPorBandeja('');
                setBandejasPorCarro('');
                setTipoPorcentaje('panadero');
                setRecipeIngs({});
                setSelectedInsumoId('');
                setIngPctFabricante('');
                setIngPctPanadero('');
                setIngPctEstandar('');
                setEditingId(null);
            };

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setFoto(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleAddIngredient = () => {
                if (!selectedInsumoId) {
                    alert('Selecciona un ingrediente.');
                    return;
                }
                const pFab = parseFloat(ingPctFabricante) || 0;
                const pPan = parseFloat(ingPctPanadero) || 0;
                const pEst = parseFloat(ingPctEstandar) || 0;

                if (pFab <= 0 && pPan <= 0 && pEst <= 0) {
                    alert('Debes ingresar al menos un porcentaje mayor a 0% en alguno de los tipos.');
                    return;
                }

                setRecipeIngs(prev => ({
                    ...prev,
                    [selectedInsumoId]: {
                        fabricante: pFab,
                        panadero: pPan,
                        estandar: pEst
                    }
                }));

                setSelectedInsumoId('');
                setIngPctFabricante('');
                setIngPctPanadero('');
                setIngPctEstandar('');
            };

            const handleRemoveIngredient = (id) => {
                const ins = insumos.find(i => i.id === id);
                if (ins && ins.nombre.toLowerCase().trim() === 'harina') {
                    alert('No se puede eliminar la Harina ya que representa el ingrediente base (100%).');
                    return;
                }
                setRecipeIngs(prev => {
                    const copy = { ...prev };
                    delete copy[id];
                    return copy;
                });
            };

            const handleSubmit = (e) => {
                e.preventDefault();

                if (!nombre.trim()) {
                    alert('El nombre de la receta es obligatorio.');
                    return;
                }
                if (!batidoBaseId) {
                    alert('Debe asociar un batido base a la receta.');
                    return;
                }
                const pesoU = parseFloat(pesoUnidad) || 0;
                const uBandeja = parseInt(unidadesPorBandeja) || 0;
                const bCarro = parseInt(bandejasPorCarro) || 0;

                if (pesoU <= 0 || uBandeja <= 0 || bCarro <= 0) {
                    alert('El peso unitario, unidades por bandeja y bandejas por carro deben ser mayores a 0.');
                    return;
                }

                const duplicado = recetas.some(r => 
                    r.id !== editingId && r.nombre.toLowerCase().trim() === nombre.toLowerCase().trim()
                );
                if (duplicado) {
                    alert('Ya existe una receta registrada con este nombre.');
                    return;
                }

                const keys = Object.keys(recipeIngs);
                if (keys.length < 2) {
                    alert('La receta debe contener al menos 2 ingredientes (la Harina y otro insumo).');
                    return;
                }

                let hasFlour = false;
                keys.forEach(k => {
                    const ins = insumos.find(i => i.id === k);
                    if (ins && ins.nombre.toLowerCase().includes('harina')) {
                        const p = recipeIngs[k];
                        if (p.fabricante === 100 || p.panadero === 100 || p.estandar === 100) {
                            hasFlour = true;
                        }
                    }
                });

                if (!hasFlour) {
                    alert('Debe añadir un ingrediente que contenga "Harina" en su nombre y tener fijado su porcentaje en 100% en cualquiera de los perfiles.');
                    return;
                }

                const savedRecipe = {
                    id: editingId ? editingId : 'r_' + Date.now(),
                    nombre: nombre.trim(),
                    foto,
                    notas: notas.trim(),
                    temporada,
                    esActiva,
                    batidoBaseId,
                    pesoUnidad: pesoU,
                    unidadesPorBandeja: uBandeja,
                    bandejasPorCarro: bCarro,
                    tipoPorcentaje,
                    porcentajes: recipeIngs
                };

                if (editingId) {
                    setRecetas(prev => prev.map(r => r.id === editingId ? savedRecipe : r));
                    alert('Receta actualizada con éxito.');
                } else {
                    setRecetas(prev => [...prev, savedRecipe]);
                    alert('Receta guardada con éxito.');
                }

                resetForm();
            };

            const handleEdit = (receta) => {
                setNombre(receta.nombre);
                setFoto(receta.foto || '');
                setNotas(receta.notas || '');
                setTemporada(receta.temporada);
                setEsActiva(receta.esActiva);
                setBatidoBaseId(receta.batidoBaseId);
                setPesoUnidad(receta.pesoUnidad.toString());
                setUnidadesPorBandeja(receta.unidadesPorBandeja.toString());
                setBandejasPorCarro(receta.bandejasPorCarro.toString());
                setTipoPorcentaje(receta.tipoPorcentaje);
                setRecipeIngs({ ...receta.porcentajes });
                setEditingId(receta.id);
            };

            const handleDelete = (id, nombreReceta, esActivaStatus) => {
                if (esActivaStatus) {
                    alert(`La receta "${nombreReceta}" está activa y no puede ser eliminada por motivos de seguridad.`);
                    return;
                }
                if (window.confirm(`¿Estás seguro de que deseas eliminar la receta "${nombreReceta}"?`)) {
                    setRecetas(prev => prev.filter(r => r.id !== id));
                }
            };

            const getRendimientoCarro = (receta) => {
                return receta.unidadesPorBandeja * receta.bandejasPorCarro;
            };

            return (
                <div>
                    <h2 class="view-title">Módulo de Recetas</h2>
                    <p class="view-subtitle">Administra tus fórmulas y asocia rendimientos por bandejas, carros y temporadas.</p>

                    <div class="grid-2">
                        {/* Editor Card */}
                        <div class="glass-panel" style={{ gridColumn: 'span 2' }}>
                            <h3 class="mb-4 font-bold">{editingId ? `Editar Receta: ${nombre}` : 'Registrar Nueva Receta'}</h3>
                            
                            <form onSubmit={handleSubmit}>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Nombre de la Receta</label>
                                        <input 
                                            type="text" 
                                            value={nombre} 
                                            onChange={(e) => setNombre(e.target.value)} 
                                            placeholder="Ej. Marraqueta Tradicional"
                                        />
                                    </div>
                                    <div class="form-group">
                                        <label>Batido Base Vinculado</label>
                                        <select value={batidoBaseId} onChange={(e) => setBatidoBaseId(e.target.value)}>
                                            <option value="">-- Seleccionar Batido Base --</option>
                                            {batidosBase.map(b => (
                                                <option key={b.id} value={b.id}>{b.nombre} ({b.temporada})</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>

                                <div class="grid-3">
                                    <div class="form-group">
                                        <label>Peso de Pan Unitario (g)</label>
                                        <input 
                                            type="number" 
                                            value={pesoUnidad} 
                                            onChange={(e) => setPesoUnidad(e.target.value)} 
                                            placeholder="Ej. 65"
                                            min="1"
                                        />
                                    </div>
                                    <div class="form-group">
                                        <label>Unidades por Bandeja</label>
                                        <input 
                                            type="number" 
                                            value={unidadesPorBandeja} 
                                            onChange={(e) => setUnidadesPorBandeja(e.target.value)} 
                                            placeholder="Ej. 32"
                                            min="1"
                                        />
                                    </div>
                                    <div class="form-group">
                                        <label>Bandejas por Carro</label>
                                        <input 
                                            type="number" 
                                            value={bandejasPorCarro} 
                                            onChange={(e) => setBandejasPorCarro(e.target.value)} 
                                            placeholder="Ej. 18"
                                            min="1"
                                        />
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Temporada</label>
                                        <select value={temporada} onChange={(e) => setTemporada(e.target.value)}>
                                            <option value="verano">Verano</option>
                                            <option value="invierno">Invierno</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Porcentaje Preferido en Calculadora</label>
                                        <select value={tipoPorcentaje} onChange={(e) => setTipoPorcentaje(e.target.value)}>
                                            <option value="fabricante">Porcentaje Fabricante</option>
                                            <option value="panadero">Porcentaje Panadero</option>
                                            <option value="estandar">Porcentaje Estándar Empresa</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Imagen del Producto</label>
                                        <input type="file" accept="image/*" onChange={handleImageChange} />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>Notas de Preparación</label>
                                    <textarea value={notas} onChange={(e) => setNotas(e.target.value)} placeholder="Ej. Tiempo de fermentación, temperatura del horno, tips..."></textarea>
                                </div>

                                {/* Ingredient Builder block */}
                                <div class="detail-table-card mb-4">
                                    <div class="detail-table-header">
                                        <span>Insumo</span>
                                        <span>% Fab / % Pan / % Est</span>
                                        <span>Acción</span>
                                    </div>
                                    {Object.keys(recipeIngs).length === 0 ? (
                                        <p class="text-muted text-center py-4 bg-white" style={{ fontSize: '0.85rem' }}>No se han añadido ingredientes a la fórmula aún.</p>
                                    ) : (
                                        Object.entries(recipeIngs).map(([id, pct]) => {
                                            const ins = insumos.find(i => i.id === id);
                                            const name = ins ? ins.nombre : id;
                                            return (
                                                <div key={id} class="detail-table-row">
                                                    <span class="font-bold">{name}</span>
                                                    <span>{pct.fabricante}% / {pct.panadero}% / {pct.estandar}%</span>
                                                    <button type="button" class="btn btn-danger btn-sm" onClick={() => handleRemoveIngredient(id)}>Quitar</button>
                                                </div>
                                            );
                                        })
                                    )}

                                    {/* Ingredient add form */}
                                    <div class="p-3" style={{ backgroundColor: 'var(--bg-color)', borderTop: '1px solid var(--border)' }}>
                                        <label style={{ fontSize: '0.75rem', marginBottom: '4px', display: 'block' }}>Añadir Insumo a la Fórmula:</label>
                                        <div class="grid-3" style={{ gap: '10px' }}>
                                            <select value={selectedInsumoId} onChange={(e) => setSelectedInsumoId(e.target.value)} style={{ padding: '6px' }}>
                                                <option value="">-- Elegir Insumo --</option>
                                                {insumos
                                                    .filter(ins => !recipeIngs[ins.id])
                                                    .map(ins => (
                                                        <option key={ins.id} value={ins.id}>{ins.nombre} ({ins.unidad})</option>
                                                    ))
                                                }
                                            </select>
                                            <div style={{ display: 'flex', gap: '4px' }}>
                                                <input type="number" step="0.1" value={ingPctFabricante} onChange={(e) => setIngPctFabricante(e.target.value)} placeholder="% Fab" style={{ padding: '6px' }} />
                                                <input type="number" step="0.1" value={ingPctPanadero} onChange={(e) => setIngPctPanadero(e.target.value)} placeholder="% Pan" style={{ padding: '6px' }} />
                                                <input type="number" step="0.1" value={ingPctEstandar} onChange={(e) => setIngPctEstandar(e.target.value)} placeholder="% Est" style={{ padding: '6px' }} />
                                            </div>
                                            <button type="button" class="btn btn-secondary btn-sm" onClick={handleAddIngredient}>Añadir</button>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group mt-2">
                                    <label class="checkbox-container">
                                        <input 
                                            type="checkbox" 
                                            checked={esActiva} 
                                            onChange={(e) => setEsActiva(e.target.checked)}
                                        />
                                        <span class="checkmark"></span>
                                        Receta Activa (Previene eliminación por seguridad)
                                    </label>
                                </div>

                                <div class="form-row mt-4">
                                    <button type="submit" class="btn btn-primary">{editingId ? 'Actualizar Receta' : 'Guardar Receta'}</button>
                                    <button type="button" class="btn btn-outline" onClick={resetForm}>Limpiar / Cancelar</button>
                                </div>
                            </form>
                        </div>

                        {/* List Card */}
                        <div class="glass-panel" style={{ gridColumn: 'span 2' }}>
                            <h3 class="mb-4 font-bold">Fórmulas Registradas ({recetas.length})</h3>
                            {recetas.length === 0 ? (
                                <p class="text-muted text-center py-6">No hay recetas registradas.</p>
                            ) : (
                                <div class="table-responsive">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Receta</th>
                                                <th>Batido Base</th>
                                                <th>Temporada</th>
                                                <th>Carro / Band</th>
                                                <th>Estado</th>
                                                <th class="text-right">Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {recetas.map(rec => {
                                                const bat = batidosBase.find(b => b.id === rec.batidoBaseId);
                                                return (
                                                    <tr key={rec.id}>
                                                        <td class="font-bold">{rec.nombre}</td>
                                                        <td>{bat ? bat.nombre : 'No vinculado'}</td>
                                                        <td>
                                                            <span class={`badge ${rec.temporada === 'verano' ? 'badge-warning' : 'badge-primary'}`}>
                                                                {rec.temporada}
                                                            </span>
                                                        </td>
                                                        <td>{rec.bandejasPorCarro}c / {rec.unidadesPorBandeja}u ({getRendimientoCarro(rec)} U)</td>
                                                        <td>
                                                            <span class={`badge ${rec.esActiva ? 'badge-success' : 'badge-danger'}`}>
                                                                {rec.esActiva ? 'Activa' : 'Inactiva'}
                                                            </span>
                                                        </td>
                                                        <td class="text-right">
                                                            <button class="btn btn-secondary btn-sm" onClick={() => handleEdit(rec)} style={{ marginRight: '6px' }}>Editar</button>
                                                            <button 
                                                                class="btn btn-danger btn-sm" 
                                                                onClick={() => handleDelete(rec.id, rec.nombre, rec.esActiva)}
                                                                disabled={rec.esActiva}
                                                                title={rec.esActiva ? 'No se puede eliminar una receta activa' : ''}
                                                            >
                                                                Eliminar
                                                            </button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 5. CALCULADORA VERSÁTIL (MOTOR CENTRAL) VIEW
        // ==========================================
        function CalculadoraView({ recetas, insumos, batidosBase, preset, clearPreset, onSendToRegister }) {
            const [receta1Id, setReceta1Id] = useState('');
            const [pctType1, setPctType1] = useState('panadero');
            const [calcMode1, setCalcMode1] = useState('ingrediente');

            const [pivot1Id, setPivot1Id] = useState('');
            const [pivot1Weight, setPivot1Weight] = useState('');
            const [pivot1Unit, setPivot1Unit] = useState('Gr');

            const [qtyBandejas1, setQtyBandejas1] = useState('');
            const [qtyUnidades1, setQtyUnidades1] = useState('');

            const [combinar, setCombinar] = useState(false);

            const [receta2Id, setReceta2Id] = useState('');
            const [pctType2, setPctType2] = useState('panadero');
            const [calcMode2, setCalcMode2] = useState('ingrediente');

            const [pivot2Id, setPivot2Id] = useState('');
            const [pivot2Weight, setPivot2Weight] = useState('');
            const [pivot2Unit, setPivot2Unit] = useState('Gr');

            const [qtyBandejas2, setQtyBandejas2] = useState('');
            const [qtyUnidades2, setQtyUnidades2] = useState('');

            useEffect(() => {
                if (preset) {
                    setReceta1Id(preset);
                    const rec = recetas.find(r => r.id === preset);
                    if (rec) {
                        setPctType1(rec.tipoPorcentaje);
                        const keys = Object.keys(rec.porcentajes);
                        if (keys.length > 0) {
                            setPivot1Id(keys[0]);
                        }
                    }
                    clearPreset();
                }
            }, [preset]);

            useEffect(() => {
                const rec = recetas.find(r => r.id === receta1Id);
                if (rec) {
                    setPctType1(rec.tipoPorcentaje);
                    const keys = Object.keys(rec.porcentajes);
                    if (keys.length > 0) {
                        setPivot1Id(keys[0]);
                    }
                }
            }, [receta1Id]);

            useEffect(() => {
                const rec = recetas.find(r => r.id === receta2Id);
                if (rec) {
                    setPctType2(rec.tipoPorcentaje);
                    const keys = Object.keys(rec.porcentajes);
                    if (keys.length > 0) {
                        setPivot2Id(keys[0]);
                    }
                }
            }, [receta2Id]);

            const rec1 = useMemo(() => recetas.find(r => r.id === receta1Id), [recetas, receta1Id]);
            const rec2 = useMemo(() => recetas.find(r => r.id === receta2Id), [recetas, receta2Id]);

            const batidoBaseCompatible = useMemo(() => {
                if (!combinar || !rec1 || !rec2) return true;
                return rec1.batidoBaseId === rec2.batidoBaseId;
            }, [combinar, rec1, rec2]);

            const calculateRecipe = (receta, pctType, calcMode, pivotId, pivotWeight, pivotUnit, qtyBandejas, qtyUnidades) => {
                if (!receta) return null;

                let flourWeightG = 0;
                let totalDoughG = 0;
                let units = 0;
                let trays = 0;
                let carriages = 0;

                let sumPercentages = 0;
                const ingredientPcts = {};
                Object.entries(receta.porcentajes).forEach(([id, pct]) => {
                    const val = pct[pctType] || 0;
                    ingredientPcts[id] = val;
                    sumPercentages += val;
                });

                if (calcMode === 'ingrediente') {
                    const weightVal = parseFloat(pivotWeight) || 0;
                    if (weightVal <= 0) return null;

                    const weightG = pivotUnit === 'Kg' || pivotUnit === 'Ltr' ? weightVal * 1000 : weightVal;
                    const pivotPct = ingredientPcts[pivotId] || 100;
                    
                    const factor = weightG / pivotPct;
                    flourWeightG = factor * 100;
                    totalDoughG = factor * sumPercentages;

                    units = totalDoughG / receta.pesoUnidad;
                    trays = units / receta.unidadesPorBandeja;
                    carriages = trays / receta.bandejasPorCarro;
                } else if (calcMode === 'bandejas') {
                    const traysVal = parseFloat(qtyBandejas) || 0;
                    if (traysVal <= 0) return null;

                    trays = traysVal;
                    units = trays * receta.unidadesPorBandeja;
                    totalDoughG = units * receta.pesoUnidad;
                    
                    const factor = totalDoughG / sumPercentages;
                    flourWeightG = factor * 100;
                    carriages = trays / receta.bandejasPorCarro;
                } else if (calcMode === 'unidades') {
                    const unitsVal = parseFloat(qtyUnidades) || 0;
                    if (unitsVal <= 0) return null;

                    units = unitsVal;
                    totalDoughG = units * receta.pesoUnidad;
                    
                    const factor = totalDoughG / sumPercentages;
                    flourWeightG = factor * 100;
                    trays = units / receta.unidadesPorBandeja;
                    carriages = trays / receta.bandejasPorCarro;
                }

                const ingredientsCalculated = {};
                Object.entries(ingredientPcts).forEach(([id, pct]) => {
                    const factor = flourWeightG / 100;
                    ingredientsCalculated[id] = factor * pct;
                });

                return {
                    recetaId: receta.id,
                    recetaNombre: receta.nombre,
                    flourWeightG,
                    totalDoughG,
                    units,
                    trays,
                    carriages,
                    ingredients: ingredientsCalculated
                };
            };

            const result1 = useMemo(() => {
                return calculateRecipe(rec1, pctType1, calcMode1, pivot1Id, pivot1Weight, pivot1Unit, qtyBandejas1, qtyUnidades1);
            }, [rec1, pctType1, calcMode1, pivot1Id, pivot1Weight, pivot1Unit, qtyBandejas1, qtyUnidades1]);

            const result2 = useMemo(() => {
                if (!combinar) return null;
                return calculateRecipe(rec2, pctType2, calcMode2, pivot2Id, pivot2Weight, pivot2Unit, qtyBandejas2, qtyUnidades2);
            }, [combinar, rec2, pctType2, calcMode2, pivot2Id, pivot2Weight, pivot2Unit, qtyBandejas2, qtyUnidades2]);

            const combinedResults = useMemo(() => {
                if (!result1) return null;
                if (combinar && (!result2 || !batidoBaseCompatible)) return null;

                const combinedIngs = {};
                const addIngredients = (result) => {
                    Object.entries(result.ingredients).forEach(([id, weightG]) => {
                        combinedIngs[id] = (combinedIngs[id] || 0) + weightG;
                    });
                };

                addIngredients(result1);
                if (result2) {
                    addIngredients(result2);
                }

                const totalDoughG = result1.totalDoughG + (result2 ? result2.totalDoughG : 0);
                const totalFlourG = result1.flourWeightG + (result2 ? result2.flourWeightG : 0);

                let totalDryG = 0;
                Object.entries(combinedIngs).forEach(([id, weightG]) => {
                    const ins = insumos.find(i => i.id === id);
                    if (ins && !esInsumoLiquido(ins.nombre, ins.unidad)) {
                        totalDryG += weightG;
                    }
                });

                const totalCarriages = result1.carriages + (result2 ? result2.carriages : 0);
                const totalTrays = result1.trays + (result2 ? result2.trays : 0);
                const totalUnits = result1.units + (result2 ? result2.units : 0);

                const activeBatId = rec1.batidoBaseId;
                const activeBat = batidosBase.find(b => b.id === activeBatId);
                let batidosCount = 0;
                let extraMasaG = 0;
                const extraIngredients = {};

                if (activeBat && activeBat.totalMasaTeorica > 0) {
                    const teóricaMasa = activeBat.totalMasaTeorica;
                    batidosCount = Math.floor(totalDoughG / teóricaMasa);
                    extraMasaG = totalDoughG % teóricaMasa;

                    if (extraMasaG > 0) {
                        const ratio = extraMasaG / totalDoughG;
                        
                        Object.entries(result1.ingredients).forEach(([id, weightG]) => {
                            extraIngredients[id] = (extraIngredients[id] || 0) + (weightG * ratio);
                        });

                        if (result2) {
                            Object.entries(result2.ingredients).forEach(([id, weightG]) => {
                                extraIngredients[id] = (extraIngredients[id] || 0) + (weightG * ratio);
                            });
                        }
                    }
                }

                return {
                    ingredients: combinedIngs,
                    totalDoughG,
                    totalFlourG,
                    totalDryG,
                    totalCarriages,
                    totalTrays,
                    totalUnits,
                    batidosCount,
                    extraMasaG,
                    extraIngredients,
                    batidoBaseName: activeBat ? activeBat.nombre : 'No asignado',
                    batidoBaseMasaTeorica: activeBat ? activeBat.totalMasaTeorica : 0
                };
            }, [result1, result2, combinar, batidoBaseCompatible, insumos, batidosBase, rec1]);

            const handleSendToRegisterLocal = () => {
                if (!combinedResults) return;

                const batidoBaseId = rec1.batidoBaseId;
                const nameBase = combinedResults.batidoBaseName;
                
                const listPct = Object.entries(combinedResults.ingredients).map(([id, weightG]) => {
                    const ins = insumos.find(i => i.id === id);
                    const name = ins ? ins.nombre : 'Insumo';
                    const pctVal = (weightG / combinedResults.totalFlourG) * 100;
                    return {
                        nombreInsumo: name,
                        porcentaje: pctVal,
                        pesoG: weightG
                    };
                });

                onSendToRegister({
                    batidoBaseId,
                    nombreBatidoBase: nameBase,
                    pesoTeorico: combinedResults.totalDoughG,
                    porcentajesUsados: listPct
                });
            };

            return (
                <div>
                    <h2 class="view-title">🧮 Calculadora Versátil</h2>
                    <p class="view-subtitle">Escala tus fórmulas con el motor central de porcentaje panadero e ingrediente 100% pivot.</p>

                    <div class="grid-2">
                        {/* Parameter inputs */}
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                            {/* RECETA 1 PANEL */}
                            <div class="glass-panel" style={{ marginBottom: 0 }}>
                                <h3 class="mb-4 font-bold text-primary">Receta Base #1</h3>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Seleccionar Receta</label>
                                        <select value={receta1Id} onChange={(e) => setReceta1Id(e.target.value)}>
                                            <option value="">-- Seleccionar Receta --</option>
                                            {recetas.filter(r => r.esActiva).map(r => (
                                                <option key={r.id} value={r.id}>{r.nombre}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Porcentaje de Trabajo</label>
                                        <select value={pctType1} onChange={(e) => setPctType1(e.target.value)} disabled={!rec1}>
                                            <option value="fabricante">Fabricante</option>
                                            <option value="panadero">Panadero</option>
                                            <option value="estandar">Estándar Empresa</option>
                                        </select>
                                    </div>
                                </div>

                                {rec1 && (
                                    <div class="form-group">
                                        <label>Método de Entrada</label>
                                        <div style={{ display: 'flex', gap: '8px', marginTop: '4px' }}>
                                            <button 
                                                type="button" 
                                                class={`btn btn-sm ${calcMode1 === 'ingrediente' ? 'btn-primary' : 'btn-outline'}`}
                                                onClick={() => setCalcMode1('ingrediente')}
                                            >
                                                Ingrediente 100%
                                            </button>
                                            <button 
                                                type="button" 
                                                class={`btn btn-sm ${calcMode1 === 'bandejas' ? 'btn-primary' : 'btn-outline'}`}
                                                onClick={() => setCalcMode1('bandejas')}
                                            >
                                                Por Bandejas
                                            </button>
                                            <button 
                                                type="button" 
                                                class={`btn btn-sm ${calcMode1 === 'unidades' ? 'btn-primary' : 'btn-outline'}`}
                                                onClick={() => setCalcMode1('unidades')}
                                            >
                                                Por Unidades
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {rec1 && calcMode1 === 'ingrediente' && (
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label>Ingrediente Pivot 100%</label>
                                            <select value={pivot1Id} onChange={(e) => setPivot1Id(e.target.value)}>
                                                {Object.keys(rec1.porcentajes).map(id => {
                                                    const ins = insumos.find(i => i.id === id);
                                                    const name = ins ? ins.nombre : id;
                                                    return (
                                                        <option key={id} value={id}>{name}</option>
                                                    );
                                                })}
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <label>Peso Deseado</label>
                                            <div style={{ display: 'flex', gap: '6px' }}>
                                                <input type="number" step="0.01" value={pivot1Weight} onChange={(e) => setPivot1Weight(e.target.value)} placeholder="Ej. 150" />
                                                <select value={pivot1Unit} onChange={(e) => setPivot1Unit(e.target.value)} style={{ width: '80px', flexShrink: 0 }}>
                                                    <option value="Gr">Gr</option>
                                                    <option value="Kg">Kg</option>
                                                    <option value="Ltr">Ltr</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {rec1 && calcMode1 === 'bandejas' && (
                                    <div class="form-group">
                                        <label>Cantidad de Bandejas</label>
                                        <input type="number" value={qtyBandejas1} onChange={(e) => setQtyBandejas1(e.target.value)} placeholder="Ej. 9" />
                                    </div>
                                )}

                                {rec1 && calcMode1 === 'unidades' && (
                                    <div class="form-group">
                                        <label>Cantidad de Unidades (Panes)</label>
                                        <input type="number" value={qtyUnidades1} onChange={(e) => setQtyUnidades1(e.target.value)} placeholder="Ej. 288" />
                                    </div>
                                )}
                            </div>

                            {/* COMBINE CHECKBOX */}
                            {rec1 && (
                                <div class="glass-panel" style={{ marginBottom: 0, padding: '16px 24px' }}>
                                    <label class="checkbox-container">
                                        <input 
                                            type="checkbox" 
                                            checked={combinar} 
                                            onChange={(e) => setCombinar(e.target.checked)}
                                        />
                                        <span class="checkmark"></span>
                                        Combinar con otra Receta (Mismo Batido Base)
                                    </label>
                                </div>
                            )}

                            {/* RECETA 2 PANEL */}
                            {combinar && rec1 && (
                                <div class="glass-panel" style={{ marginBottom: 0 }}>
                                    <h3 class="mb-4 font-bold text-primary">Receta Base #2</h3>
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label>Seleccionar Receta</label>
                                            <select value={receta2Id} onChange={(e) => setReceta2Id(e.target.value)}>
                                                <option value="">-- Seleccionar Receta --</option>
                                                {recetas
                                                    .filter(r => r.esActiva && r.id !== receta1Id)
                                                    .map(r => (
                                                        <option key={r.id} value={r.id}>{r.nombre}</option>
                                                    ))}
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <label>Porcentaje de Trabajo</label>
                                            <select value={pctType2} onChange={(e) => setPctType2(e.target.value)} disabled={!rec2}>
                                                <option value="fabricante">Fabricante</option>
                                                <option value="panadero">Panadero</option>
                                                <option value="estandar">Estándar Empresa</option>
                                            </select>
                                        </div>
                                    </div>

                                    {rec2 && (
                                        <div class="form-group">
                                            <label>Método de Entrada</label>
                                            <div style={{ display: 'flex', gap: '8px', marginTop: '4px' }}>
                                                <button 
                                                    type="button" 
                                                    class={`btn btn-sm ${calcMode2 === 'ingrediente' ? 'btn-primary' : 'btn-outline'}`}
                                                    onClick={() => setCalcMode2('ingrediente')}
                                                >
                                                    Ingrediente 100%
                                                </button>
                                                <button 
                                                    type="button" 
                                                    class={`btn btn-sm ${calcMode2 === 'bandejas' ? 'btn-primary' : 'btn-outline'}`}
                                                    onClick={() => setCalcMode2('bandejas')}
                                                >
                                                    Por Bandejas
                                                </button>
                                                <button 
                                                    type="button" 
                                                    class={`btn btn-sm ${calcMode2 === 'unidades' ? 'btn-primary' : 'btn-outline'}`}
                                                    onClick={() => setCalcMode2('unidades')}
                                                >
                                                    Por Unidades
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {rec2 && calcMode2 === 'ingrediente' && (
                                        <div class="form-row">
                                            <div class="form-group">
                                                <label>Ingrediente Pivot 100%</label>
                                                <select value={pivot2Id} onChange={(e) => setPivot2Id(e.target.value)}>
                                                    {Object.keys(rec2.porcentajes).map(id => {
                                                        const ins = insumos.find(i => i.id === id);
                                                        const name = ins ? ins.nombre : id;
                                                        return (
                                                            <option key={id} value={id}>{name}</option>
                                                        );
                                                    })}
                                                </select>
                                            </div>
                                            <div class="form-group">
                                                <label>Peso Deseado</label>
                                                <div style={{ display: 'flex', gap: '6px' }}>
                                                    <input type="number" step="0.01" value={pivot2Weight} onChange={(e) => setPivot2Weight(e.target.value)} placeholder="Ej. 150" />
                                                    <select value={pivot2Unit} onChange={(e) => setPivot2Unit(e.target.value)} style={{ width: '80px', flexShrink: 0 }}>
                                                        <option value="Gr">Gr</option>
                                                        <option value="Kg">Kg</option>
                                                        <option value="Ltr">Ltr</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {rec2 && calcMode2 === 'bandejas' && (
                                        <div class="form-group">
                                            <label>Cantidad de Bandejas</label>
                                            <input type="number" value={qtyBandejas2} onChange={(e) => setQtyBandejas2(e.target.value)} placeholder="Ej. 9" />
                                        </div>
                                    )}

                                    {rec2 && calcMode2 === 'unidades' && (
                                        <div class="form-group">
                                            <label>Cantidad de Unidades (Panes)</label>
                                            <input type="number" value={qtyUnidades2} onChange={(e) => setQtyUnidades2(e.target.value)} placeholder="Ej. 288" />
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Calculations output Results */}
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                            {!batidoBaseCompatible && (
                                <div class="alert-block alert-danger">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                                    </svg>
                                    <div>
                                        <strong class="font-bold block">Incompatibilidad de Batido Base</strong>
                                        Las recetas seleccionadas no comparten el mismo batido base. Solo se permite combinar recetas con el mismo batido base para asegurar una sola amasada consistente.
                                    </div>
                                </div>
                            )}

                            {combinedResults ? (
                                <div class="glass-panel">
                                    <h3 class="mb-4 font-bold border-b pb-2">Resultados del Escalado</h3>

                                    {/* Consolidated summary weights */}
                                    <div class="grid-2 mb-4">
                                        <div class="p-3" style={{ backgroundColor: 'var(--primary-light)', borderRadius: 'var(--radius-md)' }}>
                                            <span class="badge badge-primary">Masa Total Masa</span>
                                            <h4 class="font-bold text-primary" style={{ fontSize: '1.4rem', marginTop: '4px' }}>
                                                {(combinedResults.totalDoughG / 1000).toFixed(3)} Kg
                                            </h4>
                                        </div>
                                        <div class="p-3" style={{ backgroundColor: 'var(--bg-color)', borderRadius: 'var(--radius-md)' }}>
                                            <span class="badge badge-success">Mezcla Seca Total</span>
                                            <h4 class="font-bold text-success" style={{ fontSize: '1.4rem', marginTop: '4px' }}>
                                                {(combinedResults.totalDryG / 1000).toFixed(3)} Kg

                                        </div>
                                    </div>

                                        <div class="detail-table-header">Resumen de Rendimiento</div>
                                        <div class="detail-table-row">
                                            <span>Carros Totales:</span>
                                            <span class="font-bold">{combinedResults.totalCarriages.toFixed(2)}</span>

                                                        <div class="detail-table-header" style={{ backgroundColor: 'var(--warning-light)', color: 'var(--warning)' }}>Ingredientes del Extra</div>

                                                            const ins = insumos.find(i => i.id === id);
                                                            const name = ins ? ins.nombre : id;

                                                            if (unit === 'Kg' || unit === 'Ltr') {

                                <div class="glass-panel text-center text-muted py-16">
                                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4" style={{ margin: '0 auto 16px', color: 'var(--border)' }}>
                                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                                        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/>

                                    <p>Selecciona la receta e ingresa los pesos, bandejas o unidades para ver los resultados calculados.</p>
