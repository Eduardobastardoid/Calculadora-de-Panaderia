                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 6. REGISTRO DE BATIDO (CON MERMA) VIEW
        // ==========================================
        function RegistrarBatidoView({ batidosBase, recetas, insumos, preset, clearPreset, onSave }) {
            const [batidoBaseId, setBatidoBaseId] = useState('');
            const [pesoTeorico, setPesoTeorico] = useState('');
            const [pesoReal, setPesoReal] = useState('');
            const [nota, setNota] = useState('');
            const [porcentajesUsados, setPorcentajesUsados] = useState([]);

            useEffect(() => {
                if (preset) {
                    setBatidoBaseId(preset.batidoBaseId);
                    setPesoTeorico(preset.pesoTeorico.toString());
                    setPorcentajesUsados(preset.porcentajesUsados);
                    clearPreset();
                }
            }, [preset]);

            const selectedBat = useMemo(() => {
                return batidosBase.find(b => b.id === batidoBaseId);
            }, [batidosBase, batidoBaseId]);

            const mermaCalculated = useMemo(() => {
                const teo = parseFloat(pesoTeorico) || 0;
                const real = parseFloat(pesoReal) || 0;
                if (teo <= 0 || real <= 0) return 0;
                return ((teo - real) / teo) * 100;
            }, [pesoTeorico, pesoReal]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!batidoBaseId) {
                    alert('Por favor selecciona un Batido Base.');
                    return;
                }
                const teo = parseFloat(pesoTeorico) || 0;
                const real = parseFloat(pesoReal) || 0;

                if (teo <= 0 || real <= 0) {
                    alert('El peso teórico y el peso real obtenido deben ser mayores a 0.');
                    return;
                }

                let finalPcts = porcentajesUsados;
                if (finalPcts.length === 0) {
                    const matchingRecipe = recetas.find(r => r.batidoBaseId === batidoBaseId);
                    if (matchingRecipe) {
                        finalPcts = Object.entries(matchingRecipe.porcentajes).map(([insId, p]) => {
                            const ins = insumos.find(i => i.id === insId);
                            const name = ins ? ins.nombre : 'Insumo';
                            const pctVal = p.panadero || p.fabricante || 0;
                            return {
                                nombreInsumo: name,
                                porcentaje: pctVal,
                                pesoG: (teo * pctVal) / 100
                            };
                        });
                    }
                }

                const now = new Date();
                const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
                const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
                
                const fechaLegible = `${days[now.getDay()]} ${now.getDate()} de ${months[now.getMonth()]} de ${now.getFullYear()} a las ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

                const newRecord = {
                    id: 'h_' + Date.now(),
                    batidoBaseId,
                    nombreBatidoBase: selectedBat ? selectedBat.nombre : 'Batido',
                    fechaHora: fechaLegible,
                    porcentajesUsados: finalPcts,
                    pesoTeorico: teo,
                    pesoReal: real,
                    merma: mermaCalculated,
                    nota: nota.trim()
                };

                onSave(newRecord);
                alert('Batido registrado en el historial correctamente.');
                
                setBatidoBaseId('');
                setPesoTeorico('');
                setPesoReal('');
                setNota('');
                setPorcentajesUsados([]);
            };

            return (
                <div>
                    <h2 class="view-title">Registrar Batido</h2>
                    <p class="view-subtitle">Guarda el registro de producción y calcula la merma (comparación teórico vs real obtenidos).</p>

                    <div class="grid-2">
                        {/* Form Card */}
                        <div class="glass-panel">
                            <h3 class="mb-4 font-bold">Ficha de Registro</h3>
                            <form onSubmit={handleSubmit}>
                                <div class="form-group">
                                    <label>Seleccionar Batido Base</label>
                                    <select value={batidoBaseId} onChange={(e) => setBatidoBaseId(e.target.value)}>
                                        <option value="">-- Seleccionar Batido --</option>
                                        {batidosBase.map(b => (
                                            <option key={b.id} value={b.id}>{b.nombre} (Teórica: {(b.totalMasaTeorica / 1000).toFixed(1)} Kg)</option>
                                        ))}
                                    </select>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Peso Teórico de la Masa (Gr)</label>
                                        <input 
                                            type="number" 
                                            value={pesoTeorico} 
                                            onChange={(e) => setPesoTeorico(e.target.value)} 
                                            placeholder="Ej. 25000"
                                        />
                                    </div>
                                    <div class="form-group">
                                        <label>Peso Real Obtenido (Gr)</label>
                                        <input 
                                            type="number" 
                                            value={pesoReal} 
                                            onChange={(e) => setPesoReal(e.target.value)} 
                                            placeholder="Ej. 24600"
                                        />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>Nota / Comentario del Batido</label>
                                    <textarea 
                                        value={nota} 
                                        onChange={(e) => setNota(e.target.value)} 
                                        placeholder="Ej. Masa ligeramente húmeda, temperatura del agua de 15°C..."
                                    />
                                </div>

                                <button type="submit" class="btn btn-primary btn-block">Confirmar y Archivar Registro</button>
                            </form>
                        </div>

                        {/* Merma and comparison panel */}
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                            <div class="glass-panel">
                                <h3 class="mb-4 font-bold border-b pb-2">Cálculo de Merma</h3>
                                
                                <div class="detail-table-card mb-4">
                                    <div class="detail-table-row">
                                        <span>Peso Teórico Esperado:</span>
                                        <span class="font-bold">
                                            {pesoTeorico ? `${(parseFloat(pesoTeorico) / 1000).toFixed(3)} Kg` : '0.000 Kg'}
                                        </span>
                                    </div>
                                    <div class="detail-table-row">
                                        <span>Peso Real Pesado:</span>
                                        <span class="font-bold text-primary">
                                            {pesoReal ? `${(parseFloat(pesoReal) / 1000).toFixed(3)} Kg` : '0.000 Kg'}
                                        </span>
                                    </div>
                                    <div class="detail-table-row">
                                        <span>Diferencia de Masa:</span>
                                        <span class="font-bold text-danger">
                                            {pesoTeorico && pesoReal ? `${((parseFloat(pesoTeorico) - parseFloat(pesoReal)) / 1000).toFixed(3)} Kg` : '0.000 Kg'}
                                        </span>
                                    </div>
                                </div>

                                {pesoTeorico && pesoReal && parseFloat(pesoTeorico) > 0 && parseFloat(pesoReal) > 0 ? (
                                    <div class="p-4 text-center" style={{ borderRadius: 'var(--radius-md)', backgroundColor: mermaCalculated > 0 ? 'var(--danger-light)' : 'var(--success-light)', border: '1px solid' }}>
                                        <span class="badge" style={{ backgroundColor: mermaCalculated > 0 ? 'var(--danger)' : 'var(--success)', color: 'white', fontSize: '0.8rem', padding: '4px 12px' }}>
                                            Merma de Proceso: {mermaCalculated.toFixed(2)}%
                                        </span>
                                        <p class="mt-4" style={{ fontSize: '0.85rem', color: 'var(--text-color)' }}>
                                            {mermaCalculated > 0 
                                                ? `Se ha perdido un total de ${(parseFloat(pesoTeorico) - parseFloat(pesoReal)).toFixed(0)} gramos de masa por evaporación, restos en amasadora u otros factores.`
                                                : `¡Masa excedente! Obtuviste un aumento de masa de ${Math.abs(parseFloat(pesoTeorico) - parseFloat(pesoReal)).toFixed(0)} gramos comparada con la receta estándar.`
                                            }
                                        </p>
                                    </div>
                                ) : (
                                    <p class="text-muted text-center py-6">Rellene los pesos de la ficha de registro para visualizar la merma del proceso.</p>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 7. HISTORIAL VIEW
        // ==========================================
        function HistorialView({ historial, setHistorial }) {
            const [selectedRecord, setSelectedRecord] = useState(null);

            const handleDelete = (id, date) => {
                if (window.confirm(`¿Estás seguro de que deseas eliminar permanentemente el registro de batido del día ${date}?`)) {
                    setHistorial(prev => prev.filter(h => h.id !== id));
                    if (selectedRecord && selectedRecord.id === id) {
                        setSelectedRecord(null);
                    }
                }
            };

            return (
                <div>
                    <h2 class="view-title">Historial de Batidos</h2>
                    <p class="view-subtitle">Consulta producciones anteriores y evalúa los niveles de merma histórica.</p>

                    <div class="grid-2">
                        {/* List block */}
                        <div class="glass-panel">
                            <h3 class="mb-4 font-bold">Jornadas Registradas ({historial.length})</h3>
                            {historial.length === 0 ? (
                                <p class="text-muted text-center py-6">No hay registros en el historial de producciones.</p>
                            ) : (
                                <div class="table-responsive" style={{ maxHeight: '500px' }}>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Fecha / Hora</th>
                                                <th>Batido Base</th>
                                                <th>Merma (%)</th>
                                                <th class="text-right">Acción</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {historial.map(h => (
                                                <tr 
                                                    key={h.id} 
                                                    style={{ cursor: 'pointer', backgroundColor: selectedRecord?.id === h.id ? 'var(--primary-light)' : '' }}
                                                    onClick={() => setSelectedRecord(h)}
                                                >
                                                    <td class="font-bold">{h.fechaHora.split(' a las ')[0]}</td>
                                                    <td>{h.nombreBatidoBase}</td>
                                                    <td>
                                                        <span class={`badge ${h.merma > 3 ? 'badge-danger' : h.merma > 0 ? 'badge-warning' : 'badge-success'}`}>
                                                            {h.merma.toFixed(1)}%
                                                        </span>
                                                    </td>
                                                    <td class="text-right" onClick={(e) => e.stopPropagation()}>
                                                        <button class="btn btn-danger btn-sm" onClick={() => handleDelete(h.id, h.fechaHora)}>Eliminar</button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>

                        {/* Details Block */}
                        <div class="glass-panel">
                            <h3 class="mb-4 font-bold border-b pb-2">Detalles del Batido</h3>
                            
                            {selectedRecord ? (
                                <div>
                                    <div class="mb-4">
                                        <span class="badge badge-primary">{selectedRecord.nombreBatidoBase}</span>
                                        <p class="font-bold mt-2" style={{ fontSize: '0.9rem' }}>Registrado el: {selectedRecord.fechaHora}</p>
                                    </div>

                                    <div class="detail-table-card mb-4">
                                        <div class="detail-table-header">Consolidado de Masa</div>
                                        <div class="detail-table-row">
                                            <span>Masa Teórica Calculada:</span>
                                            <span class="font-bold">{(selectedRecord.pesoTeorico / 1000).toFixed(3)} Kg</span>
                                        </div>
                                        <div class="detail-table-row">
                                            <span>Masa Real Obtenida:</span>
                                            <span class="font-bold">{(selectedRecord.pesoReal / 1000).toFixed(3)} Kg</span>
                                        </div>
                                        <div class="detail-table-row" style={{ color: selectedRecord.merma > 0 ? 'var(--danger)' : 'var(--success)' }}>
                                            <span>Porcentaje Merma:</span>
                                            <span class="font-bold">{selectedRecord.merma.toFixed(2)}%</span>
                                        </div>
                                    </div>

                                    {selectedRecord.nota && (
                                        <div class="p-3 mb-4" style={{ backgroundColor: 'var(--bg-color)', borderRadius: 'var(--radius-md)', borderLeft: '3px solid var(--primary)' }}>
                                            <strong class="block" style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--text-muted)' }}>Nota extra del registro:</strong>
                                            <p style={{ fontSize: '0.85rem', marginTop: '4px' }}>"{selectedRecord.nota}"</p>
                                        </div>
                                    )}

                                    {selectedRecord.porcentajesUsados && selectedRecord.porcentajesUsados.length > 0 && (
                                        <div class="detail-table-card">
                                            <div class="detail-table-header">Insumos Utilizados en la Receta</div>
                                            {selectedRecord.porcentajesUsados.map((ing, i) => (
                                                <div key={i} class="detail-table-row" style={{ padding: '8px 12px', fontSize: '0.8rem' }}>
                                                    <span>{ing.nombreInsumo}</span>
                                                    <span>{ing.porcentaje.toFixed(1)}% ({ing.pesoG >= 1000 ? `${(ing.pesoG/1000).toFixed(3)} Kg` : `${ing.pesoG.toFixed(0)} Gr`})</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <p class="text-muted text-center py-16">Seleccione una jornada del listado de la izquierda para ver el desglose de producción.</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

                                        <strong class="text-secondary">Porcentaje Panadero:</strong>
                                        <p class="text-muted mt-1">
                                            Método de formulación donde el peso de la **Harina** siempre representa el 100%. Todos los demás ingredientes (agua, sal, levadura) se expresan como un porcentaje relativo a ese peso de harina. Facilita el escalado de recetas a cualquier tamaño de producción.
                                        </p>
                                    </div>
                                    <div>
                                        <strong class="text-secondary">Ingrediente Pivot (100% Versátil):</strong>
                                        <p class="text-muted mt-1">
                                            Cualquier ingrediente seleccionado en la calculadora a partir del cual se escala la fórmula completa. Si ingresas "Pannivita = 150 Gr", la calculadora determina cuánta harina y otros insumos se necesitan para mantener la proporción exacta de la receta.
                                        </p>
                                    </div>
                                    <div>
                                        <strong class="text-secondary">Batido Base:</strong>
                                        <p class="text-muted mt-1">
                                            Capacidad estándar de masa (en gramos o kilogramos) que produce una tanda o ciclo de tu máquina amasadora. Sirve como unidad de medida para organizar cuántas "amasadas completas" se deben realizar en el turno.
                                        </p>
                                    </div>
                                    <div>
                                        <strong class="text-secondary">Preparado Extra (Masa Faltante):</strong>
                                        <p class="text-muted mt-1">
                                            Cantidad de masa que se requiere preparar adicionalmente a los batidos base completos para cubrir con precisión la producción solicitada de carros o bandejas, evitando el exceso de merma.
                                        </p>
                                    </div>
                                    <div>
                                        <strong class="text-secondary">Merma de Proceso:</strong>
                                        <p class="text-muted mt-1">
                                            Pérdida porcentual de masa durante el proceso de producción. Se calcula comparando el peso teórico esperado de la receta contra el peso real medido en la balanza tras el amasado:
                                            <span class="block font-bold mt-1 text-center" style={{ color: 'var(--danger)' }}>
                                                Merma = ((Peso Teórico - Peso Real) / Peso Teórico) × 100
                                            </span>
                                        </p>
                                    </div>
                                    <div>
                                        <strong class="text-secondary">Mezcla Seca:</strong>
                                        <p class="text-muted mt-1">
                                            La suma de los pesos de todos los ingredientes secos de la receta (harina, sal, azúcar, mejoradores, premezclas), excluyendo líquidos (agua, leche, jugos).
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div class="glass-panel">
                                <h3 class="font-bold text-primary mb-4" style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                    📏 Abreviaturas Utilizadas
                                </h3>
                                <div class="table-responsive">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Símbolo</th>
                                                <th>Significado</th>
                                                <th>Definición</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td class="font-bold">Gr</td>
                                                <td>Gramos</td>
                                                <td>Unidad de peso menor.</td>
                                            </tr>
                                            <tr>
                                                <td class="font-bold">Kg</td>
                                                <td>Kilogramos</td>
                                                <td>Unidad de peso mayor (1000 Gr).</td>
                                            </tr>
                                            <tr>
                                                <td class="font-bold">Ltr</td>
                                                <td>Litros</td>
                                                <td>Unidad de volumen para líquidos.</td>
                                            </tr>
                                            <tr>
                                                <td class="font-bold">Uds / u</td>
                                                <td>Unidades</td>
                                                <td>Cantidad individual de piezas de pan.</td>
                                            </tr>
                                            <tr>
                                                <td class="font-bold">Band / b</td>
                                                <td>Bandejas</td>
                                                <td>Planchas metálicas para hornear panes.</td>
                                            </tr>
                                            <tr>
                                                <td class="font-bold">Carr / c</td>
                                                <td>Carros</td>
                                                <td>Estructuras de carros con bandejas.</td>
                                            </tr>
                                            <tr>
                                                <td class="font-bold">% Fab</td>
                                                <td>Porcentaje Fabricante</td>
                                                <td>Proporción sugerida por el proveedor del insumo.</td>
                                            </tr>
                                            <tr>
                                                <td class="font-bold">% Pan</td>
                                                <td>Porcentaje Panadero</td>
                                                <td>Fórmula tradicional del maestro panadero.</td>
                                            </tr>
                                            <tr>
                                                <td class="font-bold">% Est</td>
                                                <td>Porcentaje Estándar</td>
                                                <td>Fórmula definida por la empresa para regular la calidad.</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 8. CONFIGURACIÓN VIEW
        // ==========================================
        function ConfiguracionView({ empresa, setEmpresa }) {
            const [nombre, setNombre] = useState(empresa.nombre);
            const [logo, setLogo] = useState(empresa.logo);

            const handleLogoChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setLogo(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSave = (e) => {
                e.preventDefault();
                if (!nombre.trim()) {
                    alert('El nombre de la empresa es obligatorio.');
                    return;
                }
                setEmpresa({
                    nombre: nombre.trim(),
                    logo
                });
                alert('Configuración de la empresa guardada con éxito.');
            };

            const handleRemoveLogo = () => {
                setLogo('');
            };

            return (
                <div>
                    <h2 class="view-title">Configuración del Negocio</h2>
                    <p class="view-subtitle">Personaliza la identidad visual de tu panadería en la aplicación.</p>

                    <div class="grid-2">
                        <div class="glass-panel">
                            <h3 class="mb-4 font-bold">Datos Corporativos</h3>
                            <form onSubmit={handleSave}>
                                <div class="form-group">
                                    <label>Nombre de la Empresa</label>
                                    <input 
                                        type="text" 
                                        value={nombre} 
                                        onChange={(e) => setNombre(e.target.value)} 
                                        placeholder="Ej. Panadería La Espiga Dorada"
                                    />
                                </div>

                                <div class="form-group">
                                    <label>Logotipo Corporativo</label>
                                    <input 
                                        type="file" 
                                        accept="image/*" 
                                        onChange={handleLogoChange}
                                        style={{ marginBottom: '10px' }}
                                    />
                                    {logo && (
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '16px', marginTop: '10px' }}>
                                            <div style={{ width: '80px', height: '80px', borderRadius: '50%', overflow: 'hidden', border: '1px solid var(--border)' }}>
                                                <img src={logo} alt="Previsualización" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                                            </div>
                                            <button type="button" class="btn btn-danger btn-sm" onClick={handleRemoveLogo}>Eliminar Logo</button>
                                        </div>
                                    )}
                                </div>

                                <button type="submit" class="btn btn-primary mt-4">Guardar Cambios</button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // Render React DOM to root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
